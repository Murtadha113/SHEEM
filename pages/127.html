<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دنيا الدنانير - SHEEM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #0f0f1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }
  .num-badge {
    background: rgba(233,69,96,0.15);
    color: #e94560;
    border-radius: 12px;
    padding: 4px 14px;
    font-size: 0.85rem;
    font-weight: bold;
    margin-bottom: 14px;
  }
  .card {
    background: linear-gradient(145deg, #1e1e2e, #16213e);
    border: 1px solid rgba(233,69,96,0.3);
    border-radius: 20px;
    padding: 24px 20px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .card-title {
    font-size: 1.7rem;
    font-weight: bold;
    color: #fff;
    margin-bottom: 8px;
  }
  .card-meta {
    color: #888;
    font-size: 0.9rem;
    margin-bottom: 18px;
  }
  .card-meta span {
    background: rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 3px 10px;
    margin: 0 3px;
  }
  .img-wrapper {
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 18px;
    border: 2px solid rgba(233,69,96,0.3);
    background: #111;
  }
  .img-wrapper img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
  }
  .hint-box {
    background: rgba(255,255,255,0.05);
    border-right: 3px solid #e94560;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 1rem;
    color: #d0d0e0;
    line-height: 1.7;
    text-align: right;
  }
  .logo {
    margin-top: 22px;
    color: #e94560;
    font-size: 0.9rem;
    letter-spacing: 3px;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="num-badge">#127</div>
<div class="card">
  <div class="card-title">دنيا الدنانير</div>
  <div class="card-meta">
    <span>مسلسل</span>
  </div>
  <div class="img-wrapper">
    <img src="https://raw.githubusercontent.com/Murtadha113/SHEEM/main/M/127_%D8%AF%D9%86%D9%8A%D8%A7%20%D8%A7%D9%84%D8%AF%D9%86%D8%A7%D9%86%D9%8A%D8%B1.jpg" alt="دنيا الدنانير" onerror="this.parentElement.innerHTML='<p style=color:#555;padding:40px>الصورة غير متوفرة</p>'">
  </div>
  <div class="hint-box">مسلسل</div>
</div>
<div class="logo">✦ SHEEM ✦</div>
</body>
</html>
